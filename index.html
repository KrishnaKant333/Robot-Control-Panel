<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D Robot Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="heading">
        <h1>Interactive 2D Robot Control Panel</h1>
    </div>
    <div class="hero">
       <div class="board" id="board"></div>
        <div class="controls">
            <div class="pos">
                <div class="curr">Current Position : (0,0)</div>
                <div class="dir">Direction Facing : North</div>
                <div class="stp">Steps Taken : 0</div>
                <div class="battery">Battery Level : 100</div>
            </div>
            <div class="move">
                <div class="up"><button>^</button></div>
                <div class="left-right">
                    <span class="left"><button><</button></span>
                    <span class="autopilot" id="auto">
                        <span>
                            <img src="assets/robot-svgrepo-com.svg" alt="robot-icon">
                        </span>
                        <span>Autopilot Mode</span>
                    </span>
                    <span class="right"><button>></button></span>
                </div>
                <div class="down"><button>^</button></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
