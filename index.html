<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D Robot Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="heading">
        <h1>Interactive 2D Robot Control Panel</h1>
    </div>
    <div class="hero">
       <div class="board" id="board"></div>
        <div class="controls">
            <div class="status" id="status"></div>
            <div class="pos">
                <div class="curr">Current Position : (0,0)</div>
                <div class="dir">Direction Facing : --</div>
                <div class="stp">Steps Taken : 0</div>
                <div class="battery">Battery Level : 100</div>
            </div>
            <div class="move" id="move">
                <div class="up"><button class="movement" onclick="movement('up')">^</button></div>
                <div class="left-right">
                    <span class="left"><button class="movement" onclick="movement('left')"><</button></span>
                    <span class="autopilot" id="auto">
                        <span>
                            <img src="assets/robot-svgrepo-com.svg" alt="robot-icon">
                        </span>
                        <span>Autopilot Mode (F)</span>
                    </span>
                    <span class="stop" id="stop">
                        <span class="stop-sign"><img src="assets/stop-signs-svgrepo-com.svg" alt="Stop Sign"></span>
                        <span>STOP (Enter/Space)</span>
                    </span>
                    <span class="right"><button class="movement" onclick="movement('right')">></button></span>
                </div>
                <div class="down"><button class="movement" onclick="movement('down')">^</button></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
